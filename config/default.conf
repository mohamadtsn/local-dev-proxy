#!/bin/bash
# config/default.conf

# Default configuration for local-dev-proxy
# Users can override these by creating ~/.local-dev-proxy.conf

# ============================================================================
# General Settings
# ============================================================================

# Base directory (auto-detected, can be overridden)
export BASE_DIR="${BASE_DIR:-$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)}"

# Working mode: "docker" or "local" or "auto"
# - docker: Use Docker container for Nginx
# - local: Use system Nginx installation
# - auto: Auto-detect (prefer docker if available)
export PROXY_MODE="${PROXY_MODE:-auto}"

# ============================================================================
# Docker Settings (only used when PROXY_MODE is "docker" or "auto")
# ============================================================================

# Docker container name
export DOCKER_CONTAINER_NAME="${DOCKER_CONTAINER_NAME:-nginx-main}"

# Docker network mode for accessing host
# Options: "host.docker.internal", "gateway", "custom"
export DOCKER_HOST_ACCESS="${DOCKER_HOST_ACCESS:-auto}"

# Custom Docker host IP (only used when DOCKER_HOST_ACCESS is "custom")
export DOCKER_CUSTOM_HOST_IP="${DOCKER_CUSTOM_HOST_IP:-172.17.0.1}"

# Docker paths
export DOCKER_SSL_PATH="${DOCKER_SSL_PATH:-/etc/nginx/ssl}"
export DOCKER_CONF_PATH="${DOCKER_CONF_PATH:-/etc/nginx/conf.d}"

# ============================================================================
# Local Nginx Settings (only used when PROXY_MODE is "local")
# ============================================================================

# System Nginx paths
export NGINX_CONF_DIR="${NGINX_CONF_DIR:-/etc/nginx/sites-available}"
export NGINX_ENABLED_DIR="${NGINX_ENABLED_DIR:-/etc/nginx/sites-enabled}"
export NGINX_SSL_DIR="${NGINX_SSL_DIR:-/etc/nginx/ssl}"

# Nginx binary location
export NGINX_BIN="${NGINX_BIN:-nginx}"

# Use systemd to reload nginx (true/false)
export USE_SYSTEMD="${USE_SYSTEMD:-true}"

# ============================================================================
# Certificate Configuration
# ============================================================================

export SSL_COUNTRY="${SSL_COUNTRY:-US}"
export SSL_STATE="${SSL_STATE:-KS}"
export SSL_CITY="${SSL_CITY:-Olathe}"
export SSL_ORGANIZATION="${SSL_ORGANIZATION:-Development}"
export SSL_ORGANIZATION_UNIT="${SSL_ORGANIZATION_UNIT:-IT Department}"
export SSL_EMAIL="${SSL_EMAIL:-admin@localhost.local}"

# Certificate validity (days)
export SSL_VALIDITY_DAYS="${SSL_VALIDITY_DAYS:-3650}"

# Certificate key size
export SSL_KEY_SIZE="${SSL_KEY_SIZE:-2048}"

# ============================================================================
# Directory Structure
# ============================================================================

export CERT_DIR="${CERT_DIR:-${BASE_DIR}/certificates}"
export SITE_ENABLED_DIR="${SITE_ENABLED_DIR:-${BASE_DIR}/sites-enabled}"
export CONFIG_DIR="${CONFIG_DIR:-${BASE_DIR}/config}"
export TEMPLATE_DIR="${TEMPLATE_DIR:-${CONFIG_DIR}/templates}"
export LIB_DIR="${LIB_DIR:-${BASE_DIR}/lib}"

# ============================================================================
# Template Configuration
# ============================================================================

# Default template to use: "nginx-http", "nginx-https", "nginx-mixed", or custom path
export DEFAULT_TEMPLATE="${DEFAULT_TEMPLATE:-nginx-mixed}"

# Custom template path (optional, overrides DEFAULT_TEMPLATE if set)
export CUSTOM_TEMPLATE_PATH="${CUSTOM_TEMPLATE_PATH:-}"

# ============================================================================
# System Paths
# ============================================================================

if [[ -z "${HOSTS_FILE:-}" ]]; then
    case "$(uname -s 2>/dev/null)" in
        CYGWIN*|MINGW*|MSYS*) export HOSTS_FILE="/c/Windows/System32/drivers/etc/hosts";;
        *) export HOSTS_FILE="/etc/hosts";;
    esac
else
    export HOSTS_FILE="$HOSTS_FILE"
fi
export SYSTEM_SSL_CERT_DIR="${SYSTEM_SSL_CERT_DIR:-/etc/ssl/certs}"
export SYSTEM_SSL_KEY_DIR="${SYSTEM_SSL_KEY_DIR:-/etc/ssl/private}"

# Browser certificate database (Linux only)
export BROWSER_CERT_DB="${BROWSER_CERT_DB:-sql:$HOME/.pki/nssdb}"

# ============================================================================
# Default Values
# ============================================================================

# Default IP for hosts file entries
export DEFAULT_IP="${DEFAULT_IP:-127.0.0.1}"

# Default SSL mode for new domains (true/false)
export DEFAULT_SSL_ENABLED="${DEFAULT_SSL_ENABLED:-true}"

# ============================================================================
# Colors
# ============================================================================

export COLOR_RED='\033[1;31m'
export COLOR_GREEN='\033[1;32m'
export COLOR_YELLOW='\033[1;33m'
export COLOR_BLUE='\033[1;34m'
export COLOR_CYAN='\033[1;36m'
export COLOR_MAGENTA='\033[1;35m'
export COLOR_RESET='\033[0m'

# ============================================================================
# Logging
# ============================================================================

export LOG_LEVEL="${LOG_LEVEL:-INFO}"
export LOG_FILE="${LOG_FILE:-${BASE_DIR}/local-dev-proxy.log}"
export LOG_MAX_SIZE="${LOG_MAX_SIZE:-10485760}"  # 10MB

# ============================================================================
# Advanced Options
# ============================================================================

# Auto-reload nginx after changes
export AUTO_RELOAD="${AUTO_RELOAD:-true}"

# Backup configurations before changes
export BACKUP_CONFIGS="${BACKUP_CONFIGS:-true}"

# Verify SSL certificates after generation
export VERIFY_CERTIFICATES="${VERIFY_CERTIFICATES:-true}"
